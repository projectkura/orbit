services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orbit_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
    ports:
      - "3001:3001"
    volumes:
      - orbit_runtime:/var/lib/orbit

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - orbit_runtime:/var/lib/orbit

volumes:
  orbit_postgres_data:
  orbit_runtime:

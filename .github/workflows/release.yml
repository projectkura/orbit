name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make sure local main is up to date
        run: git pull --ff-only origin main

      - name: Bump version
        id: bump
        run: |
          VERSION=$(node ./scripts/bump-version.mjs "${{ inputs.bump }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json apps/api/package.json apps/web/package.json packages/config/package.json packages/shared/package.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"

      - name: Create tag
        run: git tag "v${{ steps.bump.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

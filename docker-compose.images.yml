services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - orbit_postgres_data:/var/lib/postgresql/data

  api:
    image: ${ORBIT_API_IMAGE:-ghcr.io/your-org/orbit-api:latest}
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
    ports:
      - "3001:3001"
    volumes:
      - orbit_runtime:/var/lib/orbit

  web:
    image: ${ORBIT_WEB_IMAGE:-ghcr.io/your-org/orbit-web:latest}
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - orbit_runtime:/var/lib/orbit

volumes:
  orbit_postgres_data:
  orbit_runtime:
